<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志 - openHSD Plugin</title>
  <style>
    :root {
      --bg-page: #1e1e1e;
      --bg-logs: #252526;
      --text-primary: #d4d4d4;
      --text-secondary: #8c8c8c;
      --border: #3c3c3c;
      --info: #3794ff;
      --warn: #cca700;
      --error: #f14c4c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 12px;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-logs);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .checkbox-label input {
      accent-color: var(--info);
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .logs {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      background: var(--bg-page);
    }

    .log-line {
      padding: 2px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      gap: 10px;
      font-family: inherit;
    }

    .log-line:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .log-time {
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .log-message {
      word-break: break-all;
    }

    .log-line.info .log-message {
      color: var(--text-primary);
    }

    .log-line.warn .log-message {
      color: var(--warn);
    }

    .log-line.error .log-message {
      color: var(--error);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-page);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div class="toolbar-left">
        <label class="checkbox-label">
          <input type="checkbox" id="autoScroll" checked>
          自动滚动
        </label>
      </div>
      <div class="toolbar-right">
        <button class="btn" id="clearBtn">清空</button>
      </div>
    </div>
    <div class="logs" id="logs">
      <div class="empty-state" id="emptyState">暂无日志</div>
    </div>
  </div>

  <script>
    const logsDiv = document.getElementById('logs');
    const emptyState = document.getElementById('emptyState');
    const autoScroll = document.getElementById('autoScroll');
    const clearBtn = document.getElementById('clearBtn');
    let logCount = 0;

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      const s = String(date.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function addLog(log) {
      if (emptyState && emptyState.parentNode) {
        emptyState.parentNode.removeChild(emptyState);
      }

      const line = document.createElement('div');
      line.className = `log-line ${log.level || 'info'}`;
      line.innerHTML = `
        <span class="log-time">${formatTime(log.time)}</span>
        <span class="log-message">${escapeHtml(log.message)}</span>
      `;
      logsDiv.appendChild(line);
      logCount++;

      if (autoScroll.checked) {
        logsDiv.scrollTop = logsDiv.scrollHeight;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.electronAPI.onLog((log) => {
      addLog(log);
    });

    clearBtn.addEventListener('click', async () => {
      logsDiv.innerHTML = '<div class="empty-state" id="emptyState">暂无日志</div>';
      logCount = 0;
      await window.electronAPI.clearLogs();
    });

    (async () => {
      const logs = await window.electronAPI.getLogs();
      if (logs.length > 0) {
        if (emptyState && emptyState.parentNode) {
          emptyState.parentNode.removeChild(emptyState);
        }
        logs.forEach(log => addLog(log));
      }
    })();
  </script>
</body>
</html>
